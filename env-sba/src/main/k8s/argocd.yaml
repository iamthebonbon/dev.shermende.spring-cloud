apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: env-sba
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iamthebonbon/env-sba-gitops.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: env-sba
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
