---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-game
  namespace: app-game
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-game
  template:
    metadata:
      name: app-game
      labels:
        app.kubernetes.io/name: app-game
    spec:
      containers:
        - name: app-game
          image: app-game:0.0.1
          imagePullPolicy: Never
          ports:
            - containerPort: 8200
          env:
            - name: spring.profiles.active
              value: local,jwt
            - name: spring.datasource.driver-class-name
              value: org.postgresql.Driver
            - name: spring.datasource.url
              value: jdbc:postgresql://env-postgres-game.env-postgres.svc.cluster.local:5432/game
            - name: spring.datasource.username
              value: postgres
            - name: spring.datasource.password
              value: postgres
            - name: spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation
              value: "true"
            - name: spring.security.user.name
              value: app-game
            - name: spring.security.user.password
              value: app-game
            - name: spring.security.oauth2.resourceserver.jwt.jwk-set-uri
              value: http://env-authorization.env-authorization.svc.cluster.local:8000/.well-known/jwks.json
            # Feign: use "local" profile with direct URL to app-reference in k8s
            - name: app-reference-api.url
              value: http://app-reference.app-reference.svc.cluster.local:8100
      serviceAccountName: app-game-sa
---
apiVersion: v1
kind: Service
metadata:
  name: app-game
  namespace: app-game
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: app-game
  ports:
    - port: 8200
